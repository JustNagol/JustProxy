<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games — Astriex</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #0a0a0a; --white: #f5f5f0; --gray: #888; }
    html, body { min-height: 100%; background: transparent; color: var(--white); font-family: 'Space Mono', monospace; overflow-x: hidden; }
    body::before { display: none; }
    .nav { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); display: flex; z-index: 300; background: #111; border: 1px solid #2a2a2a; padding: 0.5rem 0.6rem; gap: 0.25rem; }
    .nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.3rem; width: 56px; height: 52px; background: transparent; border: none; cursor: pointer; color: #555; transition: color 0.15s, background 0.15s; text-decoration: none; position: relative; }
    .nav-btn:hover { color: var(--white); background: #1a1a1a; }
    .nav-btn.active { color: var(--white); }
    .nav-btn.active::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: var(--white); border-radius: 50%; }
    .nav-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .nav-label { font-size: 0.45rem; letter-spacing: 0.1em; text-transform: uppercase; }
    .page { min-height: 100vh; padding: 3rem 2rem 8rem; max-width: 1200px; margin: 0 auto; }
    .page-header { margin-bottom: 2rem; animation: fade-up 0.6s ease both; }
    .page-title { font-family: 'Instrument Serif', serif; font-style: italic; font-size: clamp(2rem, 5vw, 3.5rem); letter-spacing: -0.02em; margin-bottom: 0.4rem; }
    .page-sub { font-size: 0.6rem; color: var(--gray); letter-spacing: 0.2em; text-transform: uppercase; }
    .controls { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; animation: fade-up 0.6s 0.1s ease both; }
    .search-wrap { display: flex; flex: 1; max-width: 360px; border: 1px solid #2a2a2a; background: #111; transition: border-color 0.2s; }
    .search-wrap:focus-within { border-color: var(--white); }
    .search-wrap input { flex: 1; background: transparent; border: none; outline: none; color: var(--white); font-family: 'Space Mono', monospace; font-size: 0.75rem; padding: 0.65rem 1rem; caret-color: var(--white); }
    .search-wrap input::placeholder { color: #333; }

    /* 6-COL GRID */
    .games-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; background: transparent; padding: 0.5rem; animation: fade-up 0.6s 0.2s ease both; }
    @media (max-width: 1100px) { .games-grid { grid-template-columns: repeat(5, 1fr); } }
    @media (max-width: 900px)  { .games-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 680px)  { .games-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 460px)  { .games-grid { grid-template-columns: repeat(2, 1fr); } }

    .game-card { background: transparent; cursor: pointer; position: relative; overflow: hidden; transition: filter 0.2s; border-radius: 10px; }
    .game-card:hover .game-overlay { opacity: 1; }
    .game-card:hover .game-thumb { filter: grayscale(0%) brightness(0.65); }
    .game-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; filter: grayscale(40%); transition: filter 0.25s; border-radius: 10px; }
    .game-no-thumb { width: 100%; aspect-ratio: 1; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; border-radius: 10px; }
    .game-no-thumb svg { width: 28px; height: 28px; stroke: #2a2a2a; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .game-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.92) 45%, transparent 100%); opacity: 0; transition: opacity 0.2s; display: flex; flex-direction: column; justify-content: flex-end; padding: 0.6rem; border-radius: 10px; }
    .game-play { width: 26px; height: 26px; border: 1px solid rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; margin-bottom: 0.35rem; }
    .game-play svg { width: 9px; height: 9px; fill: white; stroke: none; }
    .game-name { font-size: 0.55rem; letter-spacing: 0.05em; line-height: 1.3; color: var(--white); }

    .empty-state { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; padding: 5rem 2rem; text-align: center; }
    .empty-title { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.8rem; color: #222; }
    .empty-sub { font-size: 0.55rem; color: #2a2a2a; letter-spacing: 0.2em; text-transform: uppercase; }
    .empty-hint { font-size: 0.55rem; color: #333; margin-top: 0.5rem; line-height: 1.9; border: 1px dashed #1a1a1a; padding: 1rem 1.5rem; text-align: left; }
    .empty-hint code { color: #555; }

    .modal { display: none; position: fixed; inset: 0; background: #000; z-index: 500; flex-direction: column; }
    .modal.open { display: flex; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.25rem; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; background: #0a0a0a; }
    .modal-title { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.1rem; }
    .modal-close { background: transparent; border: 1px solid #2a2a2a; color: var(--white); font-family: 'Space Mono', monospace; font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.45rem 0.8rem; cursor: pointer; transition: all 0.15s; }
    .modal-close:hover { border-color: var(--white); }
    .modal-full { background: transparent; border: 1px solid #2a2a2a; color: var(--white); font-family: 'Space Mono', monospace; font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.45rem 0.8rem; cursor: pointer; transition: all 0.15s; margin-right: 0.5rem; }
    .modal-full:hover { border-color: var(--white); }
    .modal-body { flex: 1; position: relative; background: #000; }
    .game-iframe { width: 100%; height: 100%; border: none; display: block; }

    .loader { display: flex; align-items: center; justify-content: center; padding: 4rem; gap: 0.5rem; }
    .loader-dot { width: 6px; height: 6px; background: #333; border-radius: 50%; animation: pulse 1s ease infinite; }
    .loader-dot:nth-child(2) { animation-delay: 0.2s; }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{opacity:0.2;transform:scale(0.8)}50%{opacity:1;transform:scale(1)} }
    .corner { position: fixed; font-size: 0.5rem; letter-spacing: 0.15em; text-transform: uppercase; color: #2a2a2a; }
    .corner.tl { top: 1.5rem; left: 1.5rem; }
    @keyframes fade-up { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }

    .suggest-card { background: rgba(0,0,0,0.2); border: 2px dashed rgba(255,255,255,0.15); border-radius: 10px; cursor: pointer; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; transition: border-color 0.2s, background 0.2s; text-decoration: none; }
    .suggest-card:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); }
    .suggest-card svg { width: 28px; height: 28px; stroke: rgba(255,255,255,0.3); fill: none; stroke-width: 1.5; }
    .suggest-card:hover svg { stroke: rgba(255,255,255,0.7); }
    .suggest-label { font-size: 0.5rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
    .suggest-card:hover .suggest-label { color: rgba(255,255,255,0.7); }

    /* ADD GAME CARD */
    .add-game-card { background: rgba(0,0,0,0.2); border: 2px dashed rgba(255,255,255,0.15); border-radius: 10px; cursor: pointer; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; transition: border-color 0.2s, background 0.2s; }
    .add-game-card:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); }
    .add-game-card svg { width: 28px; height: 28px; stroke: rgba(255,255,255,0.3); fill: none; stroke-width: 1.5; }
    .add-game-card:hover svg { stroke: rgba(255,255,255,0.7); }
    .add-game-label { font-size: 0.5rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
    .add-game-card:hover .add-game-label { color: rgba(255,255,255,0.7); }

    /* ADD GAME MODAL */
    .add-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 600; align-items: center; justify-content: center; }
    .add-modal.open { display: flex; }
    .add-box { background: #0d0d0d; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 480px; padding: 2rem; display: flex; flex-direction: column; gap: 1.25rem; animation: fade-up 0.3s ease both; }
    .add-box-title { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.5rem; color: #fff !important; }
    .add-tabs { display: flex; gap: 0; border: 1px solid rgba(255,255,255,0.1); }
    .add-tab { flex: 1; background: transparent; border: none; color: rgba(255,255,255,0.4); font-family: 'Space Mono', monospace; font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.6rem 0.5rem; cursor: pointer; transition: all 0.15s; border-right: 1px solid rgba(255,255,255,0.1); }
    .add-tab:last-child { border-right: none; }
    .add-tab.active { background: rgba(255,255,255,0.08); color: #fff; }
    .add-tab:hover:not(.active) { color: rgba(255,255,255,0.7); }
    .add-field { display: flex; flex-direction: column; gap: 0.4rem; }
    .add-label { font-size: 0.5rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
    .add-input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); color: #fff; font-family: 'Space Mono', monospace; font-size: 0.65rem; padding: 0.6rem 0.8rem; outline: none; width: 100%; transition: border-color 0.15s; }
    .add-input:focus { border-color: rgba(255,255,255,0.6); }
    .add-input::placeholder { color: rgba(255,255,255,0.2); }
    .add-textarea { resize: vertical; min-height: 100px; font-size: 0.6rem; line-height: 1.5; }
    .add-pane { display: none; flex-direction: column; gap: 1rem; }
    .add-pane.active { display: flex; }
    .add-thumb-row { display: flex; gap: 0.75rem; align-items: flex-start; }
    .add-thumb-preview { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); overflow: hidden; }
    .add-thumb-preview img { width: 100%; height: 100%; object-fit: cover; }
    .add-thumb-preview svg { width: 20px; height: 20px; stroke: rgba(255,255,255,0.2); fill: none; }
    .add-row-btns { display: flex; gap: 0.5rem; justify-content: flex-end; }
    .add-btn { font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.55rem 1.1rem; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.15s; }
    .add-btn:hover { border-color: #fff; color: #fff; }
    .add-btn.primary { background: rgba(255,255,255,0.9); color: #000 !important; border-color: transparent; }
    .add-btn.primary:hover { background: #fff; }
    .upload-btn { display: inline-flex; align-items: center; gap: 0.5rem; font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.55rem 1rem; border: 1px dashed rgba(255,255,255,0.25); background: transparent; color: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.15s; width: 100%; justify-content: center; }
    .upload-btn:hover { border-color: rgba(255,255,255,0.6); color: #fff; }
    .upload-chosen { font-size: 0.55rem; color: rgba(255,255,255,0.5); text-align: center; margin-top: -0.5rem; }

    /* USER GAME DELETE BTN */
    .game-delete { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 0.6rem; display: none; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; z-index: 10; line-height: 1; }
    .game-card:hover .game-delete { display: flex; }

  
  /* ── VANTA READABILITY OVERRIDES ── */
  * { color: #ffffff !important; }
  input, select, textarea,
  .ctrl-select, .ctrl-input, .search-wrap, .search-wrap input,
  .season-select, #season-select,

    background: rgba(0,0,0,0.35) !important;
    border-color: rgba(255,255,255,0.25) !important;
  }
  input:focus, select:focus, textarea:focus,
  .ctrl-select:focus, .ctrl-input:focus, .season-select:focus {
    border-color: rgba(255,255,255,0.8) !important;
    background: rgba(0,0,0,0.5) !important;
  }
  .nav { background: rgba(0,0,0,0.45) !important; border-color: rgba(255,255,255,0.1) !important; }
  .nav-btn:hover { background: rgba(255,255,255,0.08) !important; }
  .cat-btn, .ctrl-btn, .modal-btn, .page-btn, .key-record-btn {
    background: rgba(0,0,0,0.35) !important;
    border-color: rgba(255,255,255,0.2) !important;
  }
  .cat-btn:hover, .ctrl-btn:hover, .modal-btn:hover, .page-btn:hover,

    background: rgba(255,255,255,0.15) !important;

  }
  .ctrl-btn.primary { background: rgba(255,255,255,0.9) !important; color: #000 !important; }
  .ctrl-btn.danger { border-color: rgba(200,80,80,0.5) !important; }
  .ctrl-btn.danger:hover { border-color: rgba(200,80,80,0.9) !important; }

  .movie-card { background: rgba(0,0,0,0.25) !important; }
  .movie-card:hover { background: rgba(0,0,0,0.4) !important; }

  .ep-item:hover { background: rgba(255,255,255,0.07) !important; }
  .ep-item.active { background: rgba(255,255,255,0.1) !important; border-left-color: #fff !important; }

  .loader-dot { background: rgba(255,255,255,0.3) !important; }
  .theme-swatch.active::after { color: #fff !important; }
  ::placeholder { color: rgba(255,255,255,0.3) !important; }

  html, body { min-height: 100% !important; }

  select option { background: #1a1a1a !important; color: #fff !important; }


  /* CSS ANIMATED BACKGROUND */
  .bg-canvas { position: fixed; inset: 0; z-index: -1; overflow: hidden; background: linear-gradient(160deg, #0d0d0d 0%, #1a1a1a 40%, #0f0f0f 100%); }
  .bg-canvas::before { content: ''; position: absolute; inset: -50%; background: radial-gradient(ellipse 80% 40% at 20% 30%, rgba(80,80,80,0.18) 0%, transparent 60%), radial-gradient(ellipse 60% 30% at 70% 60%, rgba(60,60,60,0.15) 0%, transparent 55%); animation: drift1 18s ease-in-out infinite alternate; }
  .bg-canvas::after { content: ''; position: absolute; inset: -50%; background: radial-gradient(ellipse 70% 35% at 80% 20%, rgba(70,70,70,0.14) 0%, transparent 55%), radial-gradient(ellipse 50% 40% at 30% 70%, rgba(90,90,90,0.12) 0%, transparent 50%); animation: drift2 24s ease-in-out infinite alternate; }
  @keyframes drift1 { 0%{transform:translate(0%,0%) scale(1)} 33%{transform:translate(3%,-2%) scale(1.04)} 66%{transform:translate(-2%,3%) scale(0.97)} 100%{transform:translate(2%,1%) scale(1.02)} }
  @keyframes drift2 { 0%{transform:translate(0%,0%) scale(1.02)} 33%{transform:translate(-3%,2%) scale(0.98)} 66%{transform:translate(2%,-3%) scale(1.03)} 100%{transform:translate(-1%,-1%) scale(1)} }

</style>

<body>
<div class="bg-canvas"></div>
<span class="corner tl">Astriex</span>

<div class="page">
  <div class="page-header">
    <h1 class="page-title">Games</h1>
  </div>

  <div class="controls" id="controls" style="display:none">
    <div class="search-wrap">
      <input id="search-input" type="text" placeholder="search games..." autocomplete="off" spellcheck="false" />
    </div>
  </div>

  <div class="loader" id="loader"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>
  <div class="games-grid" id="games-grid"></div>
</div>

<div class="modal" id="game-modal">
  <div class="modal-header">
    <div class="modal-title" id="modal-title"></div>
    <button class="modal-full" onclick="fullscreenGame()" id="full-btn">⛶ Fullscreen</button>
    <button class="modal-close" onclick="closeGame()">✕ Close</button>
  </div>
  <div class="modal-body">
    <iframe class="game-iframe" id="game-iframe" allow="autoplay; fullscreen"></iframe>
  </div>
</div>

<nav class="nav">
  <a class="nav-btn" href="/"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg><span class="nav-label">Home</span></a>
  <a class="nav-btn active" href="/g"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4M8 10v4"/><circle cx="15" cy="11" r="1" fill="currentColor"/><circle cx="17" cy="13" r="1" fill="currentColor"/></svg><span class="nav-label">Games</span></a>
  <a class="nav-btn" href="/m"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg><span class="nav-label">Media</span></a>
  <a class="nav-btn" href="/s"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span class="nav-label">Settings</span></a>
</nav>

<script>
  let allGames = [];

  function fullscreenGame() {
    const el = document.getElementById("game-iframe");
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
  }

  function proxyUrl(url) {
    if (typeof __uv$config !== "undefined") return __uv$config.prefix + __uv$config.encodeUrl(url);
    return "/uv/service/" + encodeURIComponent(url);
  }

  function cinemaProxy(url) {
    return "/uv/service/" + encodeURIComponent(url);
  }

  async function loadGames() {
    const override = window.ASTRIEX_GAMES_OVERRIDE;
    if (override) {
      allGames = override;
    } else {
      try {
        const res = await fetch("/api/games");
        if (res.ok) { allGames = await res.json(); }
        else { throw new Error(); }
      } catch {
        try {
          const res = await fetch("/games/games-list.json");
          allGames = res.ok ? await res.json() : [];
        } catch { allGames = []; }
      }
    }
    // Always merge user-added games from localStorage
    const userGames = getUserGames().map(g => ({ ...g, _user: true }));
    const merged = [...allGames, ...userGames];
    document.getElementById("controls").style.display = "flex";
    renderGames(merged);
    document.getElementById("loader").style.display = "none";
  }

  function renderGames(games) {
    const grid = document.getElementById("games-grid");
    document.getElementById("loader").style.display = "none";
    grid.innerHTML = "";

    if (!games.length) { renderEmpty(); return; }

    games = [...games].sort((a, b) => a.title.localeCompare(b.title));

    // Suggest card first
    const suggestCard = document.createElement("a");
    suggestCard.className = "suggest-card";
    suggestCard.href = "https://forms.gle/daxP4ijAXWYSDHp27";
    suggestCard.target = "_blank";
    suggestCard.rel = "noopener";
    suggestCard.innerHTML = `<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span class="suggest-label">Suggest Game</span>`;
    grid.appendChild(suggestCard);

    // Add Game card second
    const addCard = document.createElement("div");
    addCard.className = "add-game-card";
    addCard.innerHTML = `<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="add-game-label">Add Game</span>`;
    addCard.addEventListener("click", openAddModal);
    grid.appendChild(addCard);

    games.forEach((game, i) => {
      const card = document.createElement("div");
      card.className = "game-card";
      card.style.cssText = `animation:fade-up 0.4s ${i*0.03}s ease both`;
      card.innerHTML = game.thumbnail
        ? `<img class="game-thumb" src="${game.thumbnail}" alt="${game.title}" loading="lazy"/>
           <div class="game-overlay"><div class="game-play"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div><div class="game-name">${game.title}</div></div>`
        : `<div class="game-no-thumb"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4M8 10v4"/><circle cx="15" cy="11" r="1" fill="currentColor"/><circle cx="17" cy="13" r="1" fill="currentColor"/></svg></div>
           <div class="game-overlay"><div class="game-play"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div><div class="game-name">${game.title}</div></div>`;
      card.addEventListener("click", () => openGame(game));
      // Delete button for user-added games
      if (game._user) {
        const del = document.createElement("button");
        del.className = "game-delete";
        del.innerHTML = "✕";
        del.title = "Remove game";
        del.addEventListener("click", e => { e.stopPropagation(); deleteUserGame(game.id); });
        card.appendChild(del);
      }
      grid.appendChild(card);
    });
  }

  function renderEmpty() {
    document.getElementById("games-grid").innerHTML = `
      <div class="empty-state">
        <p class="empty-title">No games yet</p>
        <p class="empty-sub">Add games to get started</p>
        <div class="empty-hint">
          1. Drop game files into <code>public/games/files/your-game/</code><br>
          2. Add a thumbnail to <code>public/games/thumbnails/</code><br>
          3. Add an entry to <code>public/games/games-list.json</code>
        </div>
      </div>`;
  }

  function openGame(game) {
    document.getElementById("modal-title").textContent = game.title;
    document.getElementById("game-modal").classList.add("open");
    document.body.style.overflow = "hidden";
    const iframe = document.getElementById("game-iframe");
    if (game.url) {
      // External URL — run through UV proxy
      const prefix = (typeof __uv$config !== "undefined") ? __uv$config.prefix : "/uv/service/";
      const encode = (typeof __uv$config !== "undefined") ? __uv$config.encodeUrl : encodeURIComponent;
      iframe.src = prefix + encode(game.url);
    } else if (game.blobContent) {
      // HTML content — write into blob URL
      const blob = new Blob([game.blobContent], { type: "text/html" });
      iframe.src = URL.createObjectURL(blob);
    } else if (game.file) {
      iframe.src = game.file;
    }
  }

  function closeGame() {
    document.getElementById("game-modal").classList.remove("open");
    document.getElementById("game-iframe").src = "";
    document.body.style.overflow = "";
  }


  // ── ADD GAME SYSTEM ──
  let addTab = "url";
  let uploadedFileContent = null;
  let thumbDataUrl = null;

  function openAddModal() {
    document.getElementById("add-modal").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeAddModal() {
    document.getElementById("add-modal").classList.remove("open");
    document.body.style.overflow = "";
    // Reset
    document.getElementById("add-url").value = "";
    document.getElementById("add-title").value = "";
    document.getElementById("add-thumb-url").value = "";
    document.getElementById("add-paste").value = "";
    document.getElementById("submit-url").value = "";
    document.getElementById("upload-chosen").textContent = "";
    document.getElementById("thumb-preview").innerHTML = '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>';
    uploadedFileContent = null;
    thumbDataUrl = null;
  }

  function switchAddTab(tab) {
    addTab = tab;
    document.querySelectorAll(".add-tab").forEach((t, i) => {
      t.classList.toggle("active", ["url","upload","paste","submit"][i] === tab);
    });
    document.querySelectorAll(".add-pane").forEach(p => p.classList.remove("active"));
    document.getElementById("add-pane-" + tab).classList.add("active");
  }

  function onFileChosen(e) {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById("upload-chosen").textContent = file.name;
    const reader = new FileReader();
    reader.onload = ev => { uploadedFileContent = ev.target.result; };
    reader.readAsText(file);
    // Auto-fill title from filename
    if (!document.getElementById("add-title").value) {
      document.getElementById("add-title").value = file.name.replace(/\.html?$/i, "").replace(/[-_]/g, " ");
    }
  }

  function onThumbFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      thumbDataUrl = ev.target.result;
      document.getElementById("thumb-preview").innerHTML = '<img src="' + thumbDataUrl + '" />';
    };
    reader.readAsDataURL(file);
  }

  function previewThumb() {
    const url = document.getElementById("add-thumb-url").value.trim();
    if (url) {
      thumbDataUrl = null;
      document.getElementById("thumb-preview").innerHTML = '<img src="' + url + '" onerror="this.style.display=\'none\'" />';
    }
  }

  function getUserGames() {
    try { return JSON.parse(localStorage.getItem("astriex_user_games") || "[]"); }
    catch { return []; }
  }

  function saveUserGames(games) {
    localStorage.setItem("astriex_user_games", JSON.stringify(games));
  }

  function deleteUserGame(id) {
    const games = getUserGames().filter(g => g.id !== id);
    saveUserGames(games);
    reloadGames();
  }

  async function saveGame() {
    const title = document.getElementById("add-title").value.trim();
    if (!title) { alert("Please enter a title."); return; }

    const thumbUrl = thumbDataUrl || document.getElementById("add-thumb-url").value.trim() || null;
    const id = "user-" + Date.now();
    const game = { id, title, thumbnail: thumbUrl, _user: true };

    if (addTab === "url") {
      const url = document.getElementById("add-url").value.trim();
      if (!url) { alert("Please enter a URL."); return; }
      game.url = url;
    } else if (addTab === "upload") {
      if (!uploadedFileContent) { alert("Please choose an HTML file."); return; }
      // Store as blob URL using data URI
      const blob = new Blob([uploadedFileContent], { type: "text/html" });
      game.blobContent = uploadedFileContent;
      game.file = "_blob_"; // marker
    } else if (addTab === "paste") {
      const html = document.getElementById("add-paste").value.trim();
      if (!html) { alert("Please paste some HTML."); return; }
      game.blobContent = html;
      game.file = "_blob_";
    } else if (addTab === "submit") {
      const url = document.getElementById("submit-url").value.trim();
      if (!url) { alert("Please enter a URL to submit."); return; }
      // POST to backend for review
      try {
        const r = await fetch("/api/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, url, thumbnail: thumbDataUrl || document.getElementById("add-thumb-url").value.trim() || null })
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || "Failed");
        closeAddModal();
        alert("Submitted for review! It will appear on the site if approved.");
      } catch(e) {
        alert("Submission failed: " + e.message);
      }
      return;
    }

    const existing = getUserGames();
    existing.push(game);
    saveUserGames(existing);
    closeAddModal();
    reloadGames();
  }

  function reloadGames() {
    const userGames = getUserGames().map(g => ({ ...g, _user: true }));
    renderGames([...allGames, ...userGames]);
  }

  document.getElementById("search-input").addEventListener("input", e => {
    const q = e.target.value.trim().toLowerCase();
    renderGames(q ? allGames.filter(g => g.title.toLowerCase().includes(q)) : allGames);
  });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeGame(); });

  loadGames();
</script>


<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/global.js"></script>

<!-- ADD GAME MODAL -->
<div class="add-modal" id="add-modal">
  <div class="add-box">
    <div class="add-box-title">Add a Game</div>

    <!-- Tabs -->
    <div class="add-tabs">
      <button class="add-tab active" onclick="switchAddTab('url')">Link / URL</button>
      <button class="add-tab" onclick="switchAddTab('upload')">Upload HTML</button>
      <button class="add-tab" onclick="switchAddTab('paste')">Paste HTML</button>
      <button class="add-tab" onclick="switchAddTab('submit')">Submit to Site</button>
    </div>

    <!-- URL pane -->
    <div class="add-pane active" id="add-pane-url">
      <div class="add-field">
        <label class="add-label">Game URL</label>
        <input class="add-input" id="add-url" type="text" placeholder="https://game-site.com" />
      </div>
    </div>

    <!-- Upload pane -->
    <div class="add-pane" id="add-pane-upload">
      <label class="upload-btn" for="add-file-input">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Choose HTML File
      </label>
      <input type="file" id="add-file-input" accept=".html,.htm" style="display:none" onchange="onFileChosen(event)" />
      <div class="upload-chosen" id="upload-chosen"></div>
    </div>

    <!-- Paste pane -->
    <div class="add-pane" id="add-pane-paste">
      <div class="add-field">
        <label class="add-label">Paste HTML Code</label>
        <textarea class="add-input add-textarea" id="add-paste" placeholder="<!DOCTYPE html>..."></textarea>
      </div>
    </div>

    <!-- Submit pane -->
    <div class="add-pane" id="add-pane-submit">
      <div style="font-size:0.58rem;color:rgba(255,255,255,0.5);line-height:1.7;">Submit your game for review. If approved, it will appear on the site for everyone. Only URL-based games can be submitted.</div>
      <div class="add-field">
        <label class="add-label">Game URL</label>
        <input class="add-input" id="submit-url" type="text" placeholder="https://game-site.com" />
      </div>
    </div>

    <!-- Shared fields -->
    <div class="add-field">
      <label class="add-label">Game Title</label>
      <input class="add-input" id="add-title" type="text" placeholder="My Game" />
    </div>

    <div class="add-field">
      <label class="add-label">Thumbnail</label>
      <div class="add-thumb-row">
        <div class="add-thumb-preview" id="thumb-preview">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:0.5rem;">
          <input class="add-input" id="add-thumb-url" type="text" placeholder="Image URL (optional)" oninput="previewThumb()" />
          <label class="upload-btn" for="add-thumb-file" style="padding:0.4rem 0.75rem;font-size:0.5rem;">
            Upload Image
          </label>
          <input type="file" id="add-thumb-file" accept="image/*" style="display:none" onchange="onThumbFile(event)" />
        </div>
      </div>
    </div>

    <div class="add-row-btns">
      <button class="add-btn" onclick="closeAddModal()">Cancel</button>
      <button class="add-btn primary" onclick="saveGame()">Add Game</button>
    </div>
  </div>
</div>

</body>
</html>
