<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Astriex</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: #0a0a0a; color: #f5f5f0; font-family: 'Space Mono', monospace; }

    .login { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .login-box { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 1rem; }
    .login-title { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 2.5rem; }
    .login-sub { font-size: 0.55rem; color: #444; letter-spacing: 0.2em; text-transform: uppercase; }
    .field { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.5rem; }
    .field label { font-size: 0.5rem; letter-spacing: 0.15em; text-transform: uppercase; color: #555; }
    .field input { background: #111; border: 1px solid #2a2a2a; color: #fff; font-family: 'Space Mono', monospace; font-size: 0.7rem; padding: 0.65rem 0.9rem; outline: none; transition: border-color 0.15s; }
    .field input:focus { border-color: #fff; }
    .btn { font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.65rem 1.2rem; border: 1px solid #2a2a2a; background: transparent; color: #888; cursor: pointer; transition: all 0.15s; margin-top: 0.5rem; }
    .btn:hover { border-color: #fff; color: #fff; }
    .btn.primary { background: #fff; color: #000; border-color: #fff; }
    .btn.primary:hover { background: #ccc; }
    .btn.approve { border-color: #2a4a2a; color: #44aa66; }
    .btn.approve:hover { border-color: #44aa66; background: rgba(68,170,102,0.1); }
    .btn.deny { border-color: #4a2a2a; color: #aa4444; }
    .btn.deny:hover { border-color: #aa4444; background: rgba(170,68,68,0.1); }
    .err { font-size: 0.55rem; color: #aa4444; margin-top: 0.25rem; }

    .dashboard { display: none; padding: 3rem 2rem 4rem; max-width: 800px; margin: 0 auto; }
    .dash-header { margin-bottom: 2.5rem; display: flex; align-items: flex-end; justify-content: space-between; }
    .dash-title { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 2.5rem; }
    .dash-sub { font-size: 0.5rem; color: #444; letter-spacing: 0.2em; text-transform: uppercase; }
    .section-label { font-size: 0.5rem; letter-spacing: 0.25em; text-transform: uppercase; color: #333; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #1a1a1a; }
    .empty { font-size: 0.6rem; color: #333; padding: 2rem 0; }

    .card { background: #111; border: 1px solid #1a1a1a; padding: 1.25rem; margin-bottom: 0.75rem; display: flex; gap: 1rem; align-items: flex-start; }
    .card-thumb { width: 56px; height: 56px; border-radius: 6px; object-fit: cover; background: #1a1a1a; flex-shrink: 0; }
    .card-thumb-placeholder { width: 56px; height: 56px; border-radius: 6px; background: #1a1a1a; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .card-thumb-placeholder svg { width: 20px; height: 20px; stroke: #333; fill: none; stroke-width: 1.5; }
    .card-info { flex: 1; min-width: 0; }
    .card-title { font-size: 0.75rem; margin-bottom: 0.3rem; }
    .card-url { font-size: 0.55rem; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.4rem; }
    .card-date { font-size: 0.48rem; color: #333; }
    .card-actions { display: flex; gap: 0.5rem; flex-shrink: 0; align-self: center; }

    .badge { display: inline-flex; font-size: 0.45rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.2rem 0.5rem; border-radius: 2px; margin-left: 0.5rem; vertical-align: middle; }
    .badge.pending { background: rgba(180,140,0,0.15); color: #b8900a; border: 1px solid rgba(180,140,0,0.3); }
    .badge.approved { background: rgba(68,170,102,0.15); color: #44aa66; border: 1px solid rgba(68,170,102,0.3); }

    .tabs { display: flex; gap: 0; border-bottom: 1px solid #1a1a1a; margin-bottom: 2rem; }
    .tab { font-family: 'Space Mono', monospace; font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.65rem 1.2rem; background: transparent; border: none; color: #444; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
    .tab:hover { color: #fff; }
    .tab.active { color: #fff; border-bottom-color: #fff; }

    .toast { position: fixed; bottom: 2rem; right: 2rem; background: #111; border: 1px solid #2a2a2a; padding: 0.75rem 1.25rem; font-size: 0.6rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }
    .toast.ok { border-color: #44aa66; color: #44aa66; }
    .toast.err { border-color: #aa4444; color: #aa4444; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="login-screen">
  <div class="login-box">
    <div>
      <div class="login-title">Admin</div>
      <div class="login-sub" style="margin-top:0.3rem">Astriex — Game Review Dashboard</div>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pass-input" placeholder="Enter admin password" />
      <div class="err" id="login-err"></div>
    </div>
    <button class="btn primary" onclick="doLogin()">Enter</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <div>
      <div class="dash-title">Game Submissions</div>
      <div class="dash-sub" style="margin-top:0.3rem">Review &amp; approve community games</div>
    </div>
    <button class="btn" onclick="logout()">Log out</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('pending')">Pending <span id="pending-count"></span></button>
    <button class="tab" onclick="switchTab('approved')">Approved</button>
  </div>

  <div id="tab-pending">
    <div class="section-label">Awaiting Review</div>
    <div id="pending-list"><div class="empty">Loading...</div></div>
  </div>

  <div id="tab-approved" style="display:none">
    <div class="section-label">Approved Games</div>
    <div id="approved-list"><div class="empty">Loading...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let adminPass = "";
  let currentTab = "pending";

  // ── LOGIN ──
  document.getElementById("pass-input").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

  async function doLogin() {
    const pass = document.getElementById("pass-input").value;
    const res = await fetch("/api/admin/pending", { headers: { "x-admin-password": pass } });
    if (res.status === 401) { document.getElementById("login-err").textContent = "Wrong password."; return; }
    adminPass = pass;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadPending();
    loadApproved();
  }

  function logout() {
    adminPass = "";
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("pass-input").value = "";
  }

  // ── TABS ──
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", ["pending","approved"][i] === tab));
    document.getElementById("tab-pending").style.display  = tab === "pending"  ? "block" : "none";
    document.getElementById("tab-approved").style.display = tab === "approved" ? "block" : "none";
  }

  // ── LOAD PENDING ──
  async function loadPending() {
    const res  = await fetch("/api/admin/pending", { headers: { "x-admin-password": adminPass } });
    const list = await res.json();
    const el   = document.getElementById("pending-list");
    const cnt  = document.getElementById("pending-count");
    cnt.textContent = list.length ? `(${list.length})` : "";
    if (!list.length) { el.innerHTML = '<div class="empty">No pending submissions.</div>'; return; }
    el.innerHTML = "";
    list.forEach(game => el.appendChild(makePendingCard(game)));
  }

  // ── LOAD APPROVED ──
  async function loadApproved() {
    const res  = await fetch("/api/games");
    const all  = await res.json();
    // Only community (submitted) games have submittedAt
    const list = all.filter(g => g.submittedAt);
    const el   = document.getElementById("approved-list");
    if (!list.length) { el.innerHTML = '<div class="empty">No approved community games yet.</div>'; return; }
    el.innerHTML = "";
    list.forEach(game => el.appendChild(makeApprovedCard(game)));
  }

  // ── CARD BUILDERS ──
  function thumbEl(game) {
    if (game.thumbnail) return `<img class="card-thumb" src="${game.thumbnail}" onerror="this.style.display='none'" />`;
    return `<div class="card-thumb-placeholder"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;
  }

  function makePendingCard(game) {
    const div = document.createElement("div");
    div.className = "card";
    div.id = `card-${game.id}`;
    div.innerHTML = `
      ${thumbEl(game)}
      <div class="card-info">
        <div class="card-title">${game.title}</div>
        <div class="card-url">${game.url}</div>
        <div class="card-date">Submitted ${new Date(game.submittedAt).toLocaleString()}</div>
      </div>
      <div class="card-actions">
        <button class="btn approve" onclick="approve('${game.id}')">✓ Approve</button>
        <button class="btn deny" onclick="deny('${game.id}')">✕ Deny</button>
      </div>`;
    return div;
  }

  function makeApprovedCard(game) {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      ${thumbEl(game)}
      <div class="card-info">
        <div class="card-title">${game.title} <span class="badge approved">Approved</span></div>
        <div class="card-url">${game.url}</div>
        <div class="card-date">Submitted ${new Date(game.submittedAt).toLocaleString()}</div>
      </div>`;
    return div;
  }

  // ── APPROVE / DENY ──
  async function approve(id) {
    const res = await fetch(`/api/admin/approve/${id}`, { method: "POST", headers: { "x-admin-password": adminPass } });
    if (!res.ok) { toast("Failed to approve", "err"); return; }
    document.getElementById(`card-${id}`)?.remove();
    toast("Game approved ✓", "ok");
    loadPending();
    loadApproved();
  }

  async function deny(id) {
    if (!confirm("Deny and delete this submission?")) return;
    const res = await fetch(`/api/admin/deny/${id}`, { method: "POST", headers: { "x-admin-password": adminPass } });
    if (!res.ok) { toast("Failed to deny", "err"); return; }
    document.getElementById(`card-${id}`)?.remove();
    toast("Submission denied.", "err");
    loadPending();
  }

  // ── TOAST ──
  function toast(msg, type = "ok") {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = `toast show ${type}`;
    setTimeout(() => el.classList.remove("show"), 3000);
  }
</script>
</body>
</html>
